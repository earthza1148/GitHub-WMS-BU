<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WMS BU - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="container">
        <div class="login-card">
            <div class="header">
                <div class="diamond-container">
                    <div class="diamond"></div>
                    <div class="sparkle s1"></div>
                    <div class="sparkle s2"></div>
                    <div class="sparkle s3"></div>
                    <div class="sparkle s4"></div>
                </div>
                <h1>WMS BU</h1>
                <p>Warehouse Management System</p>
            </div>
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">User ID</label>
                    <input type="text" id="username" placeholder="กรอก User ID" required autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="กรอกรหัสผ่าน" required>
                </div>
                <button type="submit" id="loginBtn">เข้าสู่ระบบ</button>
            </form>
            <div id="message" class="message"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
